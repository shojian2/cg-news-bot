name: Daily CG news

on:
  schedule:
    # GitHub cron is UTC. 00:00 UTC = 09:00 JST.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-cg-news
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate and post digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID || 'C0BF1N5GDFV' }}
          SLACK_OWNER_USER_ID: ${{ vars.SLACK_OWNER_USER_ID || 'U01MSCG4RUJ' }}
        run: python main.py

      - name: Persist preferences and history
        run: |
          if git diff --quiet -- state/preferences.json; then
            exit 0
          fi
          git config user.name "cg-news-bot"
          git config user.email "cg-news-bot@users.noreply.github.com"
          git add state/preferences.json
          git commit -m "Update news bot state"
          git push
